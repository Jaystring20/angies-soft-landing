<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Angie's Soft Landing - Premium Nigerian Food Brand. Hard Day. Soft Landing.">
    <meta name="theme-color" content="#F7F2E9">
    <title>Angie's Soft Landing — Premium Nigerian Food</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cr: #F7F2E9;  /* Chiffon Cream */
            --um: #7A4B2A;  /* Golden Umber */
            --am: #C47B3B;  /* Warm Amber */
            --on: #1A1614;  /* Midnight Onyx */
            --gr: #7A6E63;  /* Warm Grey */
            --cd: #EDE8DC;  /* Deeper Cream */
            --li: #D4C9B4;  /* Linen */
            --gn: #2E7D32;  /* Success Green */
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cr);
            color: var(--on);
            line-height: 1.6;
        }

        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: var(--cr);
            border-bottom: 1px solid var(--li);
            backdrop-filter: blur(4px);
        }

        .nlogo {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--on);
        }

        .nbtn {
            background: var(--um);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .nbtn:hover {
            background: var(--am);
            transform: translateY(-2px);
        }

        .hero {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .hv {
            height: 260px;
            background: var(--cd);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .fci {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-color: var(--um);
            box-shadow: 0 10px 36px rgba(26,22,20,.2), 0 0 0 5px rgba(122,75,42,.15);
            transition: background-image .5s ease;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--um);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            display: none;
        }

        .badge.show {
            display: block;
        }

        .hc {
            padding: 32px 24px;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dcat {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--gr);
            text-transform: uppercase;
        }

        .dnm {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--on);
            line-height: 1.2;
        }

        .dds {
            font-size: 14px;
            color: var(--gr);
            line-height: 1.6;
        }

        .dftr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .dpr {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--um);
        }

        .dwa {
            background: var(--um);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .dwa:hover {
            background: var(--am);
        }

        .ht {
            height: 140px;
            background: var(--cd);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .tt-wrap {
            width: 100%;
            perspective: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .tt-inner {
            position: relative;
            width: 240px;
            height: 120px;
        }

        .tc-item {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-color: var(--um);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(.34,1.32,.64,1);
            opacity: 0.6;
        }

        .dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--li);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dot.active {
            background: var(--um);
            transform: scale(1.3);
        }

        .brand {
            padding: 60px 24px;
            text-align: center;
            background: white;
            border-top: 1px solid var(--li);
        }

        .bh {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 400;
            font-style: italic;
            color: var(--on);
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .bp {
            font-size: 14px;
            color: var(--gr);
            max-width: 600px;
            margin: 0 auto 24px;
            line-height: 1.8;
        }

        .bc {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 32px;
        }

        .blink {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            text-decoration: none;
            color: var(--um);
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .blink:hover {
            color: var(--am);
        }

        .bicon {
            font-size: 24px;
        }

        @media (min-width: 680px) {
            .hero {
                display: grid;
                grid-template-columns: 52% 48%;
                grid-template-rows: 1fr auto;
            }

            .hv {
                grid-column: 2;
                grid-row: 1 / 3;
                height: auto;
                min-height: 580px;
            }

            .fci {
                width: 240px;
                height: 240px;
            }

            .hc {
                grid-column: 1;
                grid-row: 1;
                padding: 46px 42px 14px;
            }

            .ht {
                grid-column: 1;
                grid-row: 2;
                height: 140px;
            }

            .dnm {
                font-size: 48px;
            }

            .brand {
                padding: 80px 60px;
            }

            .bh {
                font-size: 36px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nlogo">ANGIE'S</span>
        <a href="#menu" class="nbtn">Order Now</a>
    </nav>

    <section class="hero">
        <div class="hv">
            <div class="fci" id="fci"></div>
            <div class="badge" id="badge">POPULAR</div>
        </div>
        <div class="hc">
            <div class="dcat" id="dcat"></div>
            <div class="dnm" id="dnm"></div>
            <div class="dds" id="dds"></div>
            <div class="dftr">
                <div class="dpr" id="dpr"></div>
                <a class="dwa" id="dwa" target="_blank" rel="noopener noreferrer">Order</a>
            </div>
        </div>
        <div class="ht" id="menu">
            <div class="tt-wrap">
                <div class="tt-inner" id="tti"></div>
            </div>
            <div class="dots" id="dots"></div>
        </div>
    </section>

    <section class="brand">
        <div class="bh">"Hard Day. Soft Landing."</div>
        <p class="bp">Premium Nigerian comfort food, reimagined for the working professional. Every dish communicates one thing: the hard part of your day is over.</p>
        <div class="bc">
            <a href="https://wa.me/2349024142280" class="blink" target="_blank" rel="noopener noreferrer">
                <span class="bicon">💬</span>
                <span>WhatsApp</span>
            </a>
            <a href="https://instagram.com/angies_soft_landing" class="blink" target="_blank" rel="noopener noreferrer">
                <span class="bicon">📷</span>
                <span>Instagram</span>
            </a>
        </div>
    </section>

    <script src="dish_imgs.js"></script>
    <script>
        // Initialize the turntable when DOM is loaded
        if (typeof initTurntable === 'function') {
            document.addEventListener('DOMContentLoaded', initTurntable);
        }
    </script>
</body>
</html>
